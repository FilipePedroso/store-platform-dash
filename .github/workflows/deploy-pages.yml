name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Restore Excel mtime from last git commit
        run: |
          if ls data-source/*.xlsx >/dev/null 2>&1; then
            for f in data-source/*.xlsx; do
              ts=$(git log -1 --format=%cI -- "$f")
              if [ -n "$ts" ]; then
                echo "Setting mtime of $f to $ts"
                touch -d "$ts" "$f"
              fi
            done
          fi
      - name: Regenerate JSON from Excel (if present)
        run: |
          if ls data-source/*.xlsx >/dev/null 2>&1; then
            echo "Excel encontrado em data-source/, regenerando JSONs..."
            bun scripts/build_data.mjs
          else
            echo "Nenhum Excel em data-source/, usando JSONs versionados."
          fi
      # Configure base path for Project Pages (https://<user>.github.io/<repo>/)
      # Remove this env var if you deploy to a user/org root or custom domain.
      - name: Build static site
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: bun run build:static
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
